# Local dev dependencies: PostgreSQL + S3-compatible object storage (MinIO).
#
#   docker compose up -d
#
# Postgres: localhost:5432 (family/family, db family)
# MinIO API: http://localhost:9000  bucket: gideonogega-internal
# MinIO console: http://localhost:9001  (minioadmin / minioadmin)
#
# With launchSettings http/https profiles, `dotnet run` uses Photos:Provider=S3 against MinIO.

services:
  postgres:
    image: postgres:16-alpine
    container_name: family-postgres
    environment:
      POSTGRES_USER: family
      POSTGRES_PASSWORD: family
      POSTGRES_DB: family
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U family -d family"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: family-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: family-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/gideonogega-internal &&
      echo 'Bucket gideonogega-internal ready.'
      "

volumes:
  postgres_data:
  minio_data:
