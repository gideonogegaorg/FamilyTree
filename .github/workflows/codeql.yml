name: CodeQL

on:
  push:
    branches: [prod, dev]
  pull_request:
    branches: [prod, dev]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze C#
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    env:
      GITHUB_USERNAME: ${{ secrets.GH_USER }}
      GITHUB_PAT: ${{ secrets.GH_CLASSIC_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e8e8e51caba890f74f97e228d00b0b81b666ee4c # v3
        with:
          languages: csharp
          queries: security-extended

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Generate appsettings.json
        run: bash scripts/generate-appsettings.sh

      - name: Configure NuGet auth for GMO feed
        run: dotnet nuget update source GMO --username "$GITHUB_USERNAME" --password "$GITHUB_PAT" --store-password-in-clear-text

      - name: Build for CodeQL
        run: |
          dotnet restore GMO.FamilyTree.sln
          dotnet build GMO.FamilyTree.sln --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e8e8e51caba890f74f97e228d00b0b81b666ee4c # v3
        with:
          category: "/language:csharp"
