name: Build and Deploy

on:
  push:
    branches: [prod, dev]
  pull_request:
    branches: [prod, dev]

env:
  PRODUCTION_BRANCH: prod
  DEVELOPMENT_BRANCH: dev

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_USERNAME: ${{ secrets.GH_USER }}
      GITHUB_PAT: ${{ secrets.GH_CLASSIC_PAT }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'
      - name: Generate appsettings.json
        run: bash scripts/generate-appsettings.sh
      - name: Verify appsettings.json is not tracked
        run: |
          tracked=$(git ls-files '**/appsettings.json' '**/appsettings.*.json' 2>/dev/null | grep -v '\.template$' || true)
          if [ -n "$tracked" ]; then
            echo "::error::Do not commit appsettings.json or appsettings.*.json (use appsettings.json.template only):"
            echo "$tracked"
            exit 1
          fi
      - name: Configure NuGet auth for GMO feed
        run: dotnet nuget update source GMO --username "$GITHUB_USERNAME" --password "$GITHUB_PAT" --store-password-in-clear-text
      - name: Restore
        run: dotnet restore GMO.FamilyTree.sln --verbosity normal
      - name: Audit NuGet packages for vulnerabilities
        run: dotnet list GMO.FamilyTree.sln package --vulnerable --include-transitive
      - name: Verify format
        run: dotnet format GMO.FamilyTree.sln --verbosity diagnostic --verify-no-changes --no-restore

  js-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint JavaScript
        run: npm run lint:js

  build:
    runs-on: ubuntu-latest
    needs: [lint, js-lint]
    permissions:
      contents: read
      pull-requests: write
    env:
      GITHUB_USERNAME: ${{ secrets.GH_USER }}
      GITHUB_PAT: ${{ secrets.GH_CLASSIC_PAT }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    outputs:
      assembly_version: ${{ steps.setversion.outputs.assembly_version }}
      dll_version: ${{ steps.setversion.outputs.dll_version }}
      setup_changed: ${{ steps.filter.outputs.setup == 'true' && 'yes' || 'no' }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: family
          POSTGRES_PASSWORD: family
          POSTGRES_DB: family
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U family -d family"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        if: github.event_name == 'push'
        id: filter
        with:
          filters: |
            setup:
              - 'scripts/configure-service.sh'

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Check NuGet auth for GMO feed
        run: |
          if [ -z "$GITHUB_PAT" ]; then
            echo "::error::GITHUB_PAT is empty. Add repository secret GH_CLASSIC_PAT (with read:packages) in this repo."
            exit 1
          fi

      - name: Configure NuGet auth for GMO feed
        run: dotnet nuget update source GMO --username "$GITHUB_USERNAME" --password "$GITHUB_PAT" --store-password-in-clear-text

      - name: Generate appsettings.json for build
        run: bash scripts/generate-appsettings.sh

      - name: Set version
        id: setversion
        env:
          REF_NAME: ${{ github.ref_name }}
          DEVELOPMENT_BRANCH: ${{ env.DEVELOPMENT_BRANCH }}
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DAY=$(date +%d)
          HHMM=$(date +%H%M)
          ASSEMBLY_VERSION="$YEAR.$MONTH.$DAY.$HHMM"
          if [ "$REF_NAME" = "$DEVELOPMENT_BRANCH" ]; then
            DLL_VERSION="DEV-$YEAR$MONTH$DAY-$HHMM"
          else
            DLL_VERSION="$YEAR$MONTH$DAY-$HHMM"
          fi
          echo "ASSEMBLY_VERSION=$ASSEMBLY_VERSION" >> $GITHUB_ENV
          echo "DLL_VERSION=$DLL_VERSION" >> $GITHUB_ENV
          echo "assembly_version=$ASSEMBLY_VERSION" >> $GITHUB_OUTPUT
          echo "dll_version=$DLL_VERSION" >> $GITHUB_OUTPUT

      - name: Install SonarScanner
        if: env.SONAR_TOKEN != ''
        run: dotnet tool install --global dotnet-sonarscanner

      - name: SonarCloud begin
        if: env.SONAR_TOKEN != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_EVENT_NAME: ${{ github.event_name }}
          SONAR_PR_KEY: ${{ github.event.pull_request.number }}
          SONAR_PR_BRANCH: ${{ github.head_ref }}
          SONAR_PR_BASE: ${{ github.base_ref }}
          SONAR_BRANCH: ${{ github.ref_name }}
          SONAR_PROJECT_VERSION: ${{ env.DLL_VERSION }}
          SONAR_ORGANIZATION: ${{ github.repository_owner }}
          SONAR_PROJECT_KEY: ${{ github.repository_owner }}_${{ github.event.repository.name }}
          SONAR_PROJECT_NAME: ${{ github.event.repository.name }}
          PRODUCTION_BRANCH: ${{ env.PRODUCTION_BRANCH }}
        run: |
          EXCLUSIONS="**/Migrations/**,**/AppDbContextFactory.cs,**/wwwroot/lib/**,**/wwwroot/js/**,**/.github/**,**/bin/**,**/obj/**,**/coverage/**"
          COVERAGE_EXCLUSIONS="**/*.cshtml,**/*.cshtml.css,**/Views/**,**/wwwroot/**,**/S3PhotoStorageService.cs,**/Controllers/FamilyMemberController.cs"
          QG_WAIT="true"
          if [ "$SONAR_EVENT_NAME" = "pull_request" ]; then
            # PR analysis uses SonarCloud's GitHub check; scanner QG wait often fails on short-lived branches.
            QG_WAIT="false"
          fi
          # Align SonarCloud main branch with GitHub production branch (prod).
          if [ "$SONAR_EVENT_NAME" = "push" ] && [ "$SONAR_BRANCH" = "$PRODUCTION_BRANCH" ]; then
            if curl -sf -X POST -u "${SONAR_TOKEN}:" \
              "https://sonarcloud.io/api/project_branches/set_main?project=${SONAR_PROJECT_KEY}&branch=${PRODUCTION_BRANCH}"; then
              echo "SonarCloud main branch aligned to GitHub ${PRODUCTION_BRANCH}"
            else
              echo "::warning::Could not set SonarCloud main branch (SONAR_TOKEN may lack Administer Project). Skipping quality gate wait for this run."
              QG_WAIT="false"
            fi
          fi
          begin_args=(
            "/k:${SONAR_PROJECT_KEY}"
            "/o:${SONAR_ORGANIZATION}"
            "/n:${SONAR_PROJECT_NAME}"
            "/v:$SONAR_PROJECT_VERSION"
            "/d:sonar.projectBaseDir=$GITHUB_WORKSPACE"
            "/d:sonar.token=$SONAR_TOKEN"
            "/d:sonar.host.url=https://sonarcloud.io"
            "/d:sonar.qualitygate.wait=$QG_WAIT"
            "/d:sonar.cs.opencover.reportsPaths=coverage/**/coverage.opencover.xml,**/TestResults/**/coverage.opencover.xml"
            "/d:sonar.exclusions=$EXCLUSIONS"
            "/d:sonar.coverage.exclusions=$COVERAGE_EXCLUSIONS"
            "/d:sonar.cpd.exclusions=**/tst/**"
          )
          if [ "$SONAR_EVENT_NAME" = "pull_request" ]; then
            begin_args+=(
              "/d:sonar.pullrequest.key=$SONAR_PR_KEY"
              "/d:sonar.pullrequest.branch=$SONAR_PR_BRANCH"
              "/d:sonar.pullrequest.base=$SONAR_PR_BASE"
            )
          else
            begin_args+=("/d:sonar.branch.name=$SONAR_BRANCH")
          fi
          dotnet sonarscanner begin "${begin_args[@]}"

      - name: Build
        run: |
          dotnet build GMO.FamilyTree.sln --verbosity normal \
            -p:Version=${{ env.ASSEMBLY_VERSION }} \
            -p:AssemblyVersion=${{ env.ASSEMBLY_VERSION }} \
            -p:FileVersion=${{ env.ASSEMBLY_VERSION }} \
            -p:InformationalVersion=${{ env.DLL_VERSION }}

      - name: Install Playwright Browsers
        run: pwsh tst/GMO.FamilyTree.Web.UiTests/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      - name: Create working directory
        run: mkdir -p working

      - name: Test (all projects)
        run: |
          mkdir -p coverage
          dotnet test GMO.FamilyTree.sln --no-build --verbosity normal \
            --settings "$GITHUB_WORKSPACE/coverlet.runsettings" \
            --collect:"XPlat Code Coverage;Format=opencover" \
            --results-directory "$GITHUB_WORKSPACE/coverage"

      - name: SonarCloud end
        if: env.SONAR_TOKEN != ''
        run: dotnet sonarscanner end /d:sonar.token=$SONAR_TOKEN

      - name: Upload coverage results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-results
          path: |
            coverage/**/coverage.opencover.xml
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload UI test artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ui-test-artifacts
          path: working/
          retention-days: 30
          if-no-files-found: ignore

  tag:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Create and push tag
        run: |
          TAG_NAME="${{ github.ref_name }}-$(date +%Y)-$(date +%m)-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [build, tag]
    environment: ${{ github.ref_name }}
    env:
      DEPLOY_PATH: ${{ github.ref == 'refs/heads/prod' && format('/var/www/family.{0}', secrets.DEPLOY_DOMAIN) || github.ref == 'refs/heads/dev' && format('/var/www/family-dev.{0}', secrets.DEPLOY_DOMAIN) || '' }}
      FULL_HOSTNAME: ${{ github.ref == 'refs/heads/prod' && format('family.{0}', secrets.DEPLOY_DOMAIN) || github.ref == 'refs/heads/dev' && format('family-dev.{0}', secrets.DEPLOY_DOMAIN) || '' }}
      BRANCH: ${{ github.ref_name }}
      ASSEMBLY_VERSION: ${{ needs.build.outputs.assembly_version }}
      DLL_VERSION: ${{ needs.build.outputs.dll_version }}
      SETUP_CHANGED: ${{ needs.build.outputs.setup_changed }}
      PORT: ${{ vars.PORT }}
      SERVICE_NAME: ${{ vars.SERVICE_NAME }}
      CERT_DOMAIN: ${{ secrets.DEPLOY_DOMAIN }}
      POSTGRES_CONNECTION_STRING: "Host=localhost;Port=5432;Database=${{ vars.SERVICE_NAME }};Username=${{ secrets.PG_USER }};Password=${{ secrets.PG_PASS }}"
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      OPENTELEMETRY_ENABLED: ${{ secrets.OPENTELEMETRY_ENABLED }}
      OPENTELEMETRY_OTLPEXPORTENDPOINT: ${{ secrets.OPENTELEMETRY_OTLPEXPORTENDPOINT }}
      OPENTELEMETRY_LOGGINGENDPOINT: ${{ secrets.OPENTELEMETRY_LOGGINGENDPOINT }}
      OPENTELEMETRY_HEADERS: ${{ secrets.OPENTELEMETRY_HEADERS }}
      OPENTELEMETRY_METRICSENDPOINT: ${{ secrets.OPENTELEMETRY_METRICSENDPOINT }}
      GITHUB_USERNAME: ${{ secrets.GH_USER }}
      GITHUB_PAT: ${{ secrets.GH_CLASSIC_PAT }}
      IS_PRODUCTION: ${{ vars.IS_PRODUCTION }}
      PRODUCTION_MODE: ${{ github.ref == 'refs/heads/prod' && 'production' || 'development' }}
      PG_USER: ${{ secrets.PG_USER }}
      PG_PASS: ${{ secrets.PG_PASS }}
      SEC_GROUP_ID: ${{ secrets.SEC_GROUP_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Validate deploy config
        run: |
          if [ -z "$DEPLOY_PATH" ]; then
            echo "::error::DEPLOY_PATH is empty. Set DEPLOY_DOMAIN secret for this environment (or at repository level)."
            exit 1
          fi
          if [[ "$DEPLOY_PATH" != /var/www/* ]]; then
            echo "::error::DEPLOY_PATH is invalid. Set DEPLOY_DOMAIN secret for this environment."
            exit 1
          fi
          if [[ "$DEPLOY_PATH" == *. ]]; then
            echo "::error::DEPLOY_PATH looks invalid (missing domain?). Set DEPLOY_DOMAIN secret for this environment."
            exit 1
          fi
          if [ -z "$PG_USER" ] || [ -z "$PG_PASS" ]; then
            echo "::error::Set PG_USER and PG_PASS organization secrets (gideonogegaorg → Settings → Secrets → Actions). Do not duplicate on repo or environment — overrides block org-wide rotation."
            exit 1
          fi

      - name: Generate appsettings.json for deploy
        env:
          SERILOG_LOG_PATH: ${{ env.DEPLOY_PATH }}/logs
          UPLOADS_PATH: ${{ env.DEPLOY_PATH }}/uploads
          PHOTOS_PROVIDER: S3
          S3_PHOTOS_BUCKET: ${{ vars.S3_PHOTOS_BUCKET }}
          PHOTOS_APP_NAME: family
          PHOTOS_ENVIRONMENT: ${{ vars.SERVICE_NAME == 'family-dev' && 'dev' || 'prod' }}
          PHOTOS_LOCAL_BASE_PATH: uploads/photos
          TELEMETRY_ENVIRONMENT_NAME: ${{ github.ref_name }}
          IS_PRODUCTION: ${{ vars.IS_PRODUCTION }}
        run: bash scripts/generate-appsettings.sh

      - name: Generate robots.txt
        run: bash scripts/generate-robots.sh

      - name: Publish
        run: |
          dotnet publish src/GMO.FamilyTree.Web/GMO.FamilyTree.Web.csproj -c Release -o ./site \
            -p:Version=${{ env.ASSEMBLY_VERSION }} \
            -p:AssemblyVersion=${{ env.ASSEMBLY_VERSION }} \
            -p:FileVersion=${{ env.ASSEMBLY_VERSION }} \
            -p:InformationalVersion=${{ env.DLL_VERSION }}

      - name: Get GitHub Runner IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Authorize Runner IP in Security Group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id "$SEC_GROUP_ID" \
            --protocol tcp --port 22 --cidr ${{ steps.ip.outputs.ipv4 }}/32

      - name: Copy site output to EC2
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "site/*,scripts/configure-service.sh,scripts/install-aspnetcore-runtime.sh"
          target: "/tmp/family-deploy-${{ github.run_id }}"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          debug: false
          script: |
            set -e
            DEPLOY_PATH='${{ env.DEPLOY_PATH }}'
            BRANCH='${{ env.BRANCH }}'
            SETUP_CHANGED='${{ env.SETUP_CHANGED }}'
            FULL_HOSTNAME='${{ env.FULL_HOSTNAME }}'
            PORT='${{ env.PORT }}'
            SERVICE_NAME='${{ env.SERVICE_NAME }}'
            CERT_DOMAIN='${{ env.CERT_DOMAIN }}'
            PRODUCTION_MODE='${{ env.PRODUCTION_MODE }}'
            STAGING="/tmp/family-deploy-${{ github.run_id }}"
            trap 'rm -rf "$STAGING"' EXIT
            echo "[Deploy] Ensuring ASP.NET Core Runtime 10..."
            sudo bash "$STAGING/scripts/install-aspnetcore-runtime.sh"
            echo "[Deploy] Ensuring directory..."
            sudo mkdir -p "$DEPLOY_PATH/site" "$DEPLOY_PATH/logs" "$DEPLOY_PATH/uploads"
            sudo chown -R ubuntu:www-data "$DEPLOY_PATH"
            SERVICE_FILE="/etc/systemd/system/${SERVICE_NAME}.service"
            NEEDS_SETUP=no
            if [ "$SETUP_CHANGED" != "no" ] || [ ! -f "$SERVICE_FILE" ]; then
              NEEDS_SETUP=yes
            else
              DEPLOYED_DLL=""
              shopt -s nullglob
              for dll in "$STAGING/site/"*.Web.dll; do
                DEPLOYED_DLL="$(basename "$dll")"
                break
              done
              shopt -u nullglob
              if [ -n "$DEPLOYED_DLL" ] && ! grep -qF "$DEPLOYED_DLL" "$SERVICE_FILE"; then
                echo "[Deploy] Systemd unit does not reference $DEPLOYED_DLL; re-running configure-service.sh..."
                NEEDS_SETUP=yes
              fi
            fi
            if [ "$NEEDS_SETUP" = "yes" ]; then
              echo "[Deploy] Running configure-service.sh..."
              sudo bash "$STAGING/scripts/configure-service.sh" "$FULL_HOSTNAME" "$PORT" "$SERVICE_NAME" "$CERT_DOMAIN" "$PRODUCTION_MODE"
            fi
            echo "[Deploy] Copying site output..."
            cp -r "$STAGING/site/"* "$DEPLOY_PATH/site/"
            sudo chown -R ubuntu:www-data "$DEPLOY_PATH"
            echo "[Deploy] Restarting service..."
            sudo systemctl restart "$SERVICE_NAME"
            if ! systemctl is-active --quiet "$SERVICE_NAME"; then
              echo "::error::Service $SERVICE_NAME failed to start after deploy."
              sudo journalctl -u "$SERVICE_NAME" -n 80 --no-pager
              exit 1
            fi
            echo "[Deploy] Waiting for local health check on port $PORT..."
            HEALTH_OK=no
            for i in $(seq 1 24); do
              if curl -sf "http://127.0.0.1:${PORT}/health" > /dev/null; then
                echo "[Deploy] Local health check passed (+$(( (i - 1) * 5 ))s)."
                HEALTH_OK=yes
                break
              fi
              sleep 5
            done
            if [ "$HEALTH_OK" != "yes" ]; then
              echo "::error::Local health check failed after 115s on http://127.0.0.1:${PORT}/health"
              sudo journalctl -u "$SERVICE_NAME" -n 80 --no-pager
              exit 1
            fi
            echo "[Deploy] Service healthy; public health check runs from GitHub Actions."

      - name: Verify public site health
        run: |
          HEALTH_URL="https://${FULL_HOSTNAME}/health"
          echo "Polling $HEALTH_URL every 5s for up to 30s..."
          START=$(date +%s)
          while true; do
            ELAPSED=$(( $(date +%s) - START ))
            HTTP=$(curl -s -o /dev/null -w '%{http_code}' "$HEALTH_URL" || echo "000")
            echo "Health check (+${ELAPSED}s) -> HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            if [ "$ELAPSED" -ge 30 ]; then
              echo "::error::Health check failed after 30s (expected HTTP 200 from $HEALTH_URL)."
              exit 1
            fi
            sleep 5
          done

      - name: Revoke Runner IP (Cleanup)
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "$SEC_GROUP_ID" \
            --protocol tcp --port 22 --cidr ${{ steps.ip.outputs.ipv4 }}/32
