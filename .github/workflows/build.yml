name: Build and Deploy

on:
  push:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set DLL version
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          RUN_ID=${{ github.run_id }}
          BUILD=$(( RUN_ID % 65535 ))
          REVISION=$(( (RUN_ID / 65535) % 65535 ))
          echo "ASSEMBLY_VERSION=$YEAR.$MONTH.$BUILD.$REVISION" >> $GITHUB_ENV
          if [ "${{ github.ref_name }}" = "dev" ]; then
            echo "DLL_VERSION=DEV-$(date +%Y%m)$RUN_ID" >> $GITHUB_ENV
          else
            echo "DLL_VERSION=$(date +%Y%m)$RUN_ID" >> $GITHUB_ENV
          fi

      - name: Build
        run: |
          dotnet build src/Family.sln \
            -p:Version=${{ env.ASSEMBLY_VERSION }} \
            -p:AssemblyVersion=${{ env.ASSEMBLY_VERSION }} \
            -p:FileVersion=${{ env.ASSEMBLY_VERSION }} \
            -p:InformationalVersion=${{ env.DLL_VERSION }}

      - name: Create and push tag
        run: |
          TAG_NAME="${{ github.ref_name }}-$(date +%Y)-$(date +%m)-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

  # Uses GitHub Environments: main and dev. Set per environment:
  #   - SERVICE_NAME (variable), e.g. main → family-web, dev → family-web-dev
  #   - DEPLOY_DOMAIN (secret) for deploy path, e.g. gideonogega.com
  # In logs, secrets appear as ***; the remote receives the real values.
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.ref_name }}
    env:
      DEPLOY_PATH: ${{ github.ref == 'refs/heads/main' && format('/var/www/family.{0}', secrets.DEPLOY_DOMAIN) || github.ref == 'refs/heads/dev' && format('/var/www/family-dev.{0}', secrets.DEPLOY_DOMAIN) || '' }}
      BRANCH: ${{ github.ref_name }}
    steps:
      - name: Validate deploy config
        run: |
          if [ -z "$DEPLOY_PATH" ]; then
            echo "::error::DEPLOY_PATH is empty. Set DEPLOY_DOMAIN secret for this environment (or at repository level)."
            exit 1
          fi
          if [[ "$DEPLOY_PATH" != /var/www/* ]]; then
            echo "::error::DEPLOY_PATH is invalid. Set DEPLOY_DOMAIN secret for this environment."
            exit 1
          fi
          if [[ "$DEPLOY_PATH" == *. ]]; then
            echo "::error::DEPLOY_PATH looks invalid (missing domain?). Set DEPLOY_DOMAIN secret for this environment."
            exit 1
          fi

      - name: Get GitHub Runner IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Authorize Runner IP in Security Group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.SEC_GROUP_ID }} \
            --protocol tcp --port 22 --cidr ${{ steps.ip.outputs.ipv4 }}/32

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            sudo mkdir -p /git/family ${{ env.DEPLOY_PATH }}
            sudo chown -R ubuntu:ubuntu /git/family ${{ env.DEPLOY_PATH }}
            CLONE_DIR="/git/family/${{ env.BRANCH }}"
            rm -rf "$CLONE_DIR"
            git clone -b ${{ env.BRANCH }} https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git "$CLONE_DIR"
            dotnet publish "$CLONE_DIR/src/Family.Web/Family.Web.csproj" -c Release -o "${{ env.DEPLOY_PATH }}"
            sudo chown -R ubuntu:www-data ${{ env.DEPLOY_PATH }}
            sudo chmod -R 755 ${{ env.DEPLOY_PATH }}
            sudo systemctl restart ${{ vars.SERVICE_NAME }}

      - name: Revoke Runner IP (Cleanup)
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.SEC_GROUP_ID }} \
            --protocol tcp --port 22 --cidr ${{ steps.ip.outputs.ipv4 }}/32
