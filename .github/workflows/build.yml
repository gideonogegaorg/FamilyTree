name: Build and Deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # GH_CLASSIC_PAT must have read:packages so restore can pull GMO.* from GitHub Packages
    env:
      NUGET_AUTH_TOKEN: ${{ secrets.GH_CLASSIC_PAT }}
    outputs:
      assembly_version: ${{ steps.setversion.outputs.assembly_version }}
      dll_version: ${{ steps.setversion.outputs.dll_version }}
      setup_changed: ${{ steps.filter.outputs.setup }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            setup:
              - 'scripts/configure-service.sh'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Check NuGet auth for GMO feed
        run: |
          if [ -z "$NUGET_AUTH_TOKEN" ]; then
            echo "::error::NUGET_AUTH_TOKEN is empty. Add repository secret GH_CLASSIC_PAT (with read:packages) in this repo, or ensure the org secret is available to this repository."
            exit 1
          fi

      - name: Set DLL version
        id: setversion
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          RUN_ID=${{ github.run_id }}
          BUILD=$(( RUN_ID % 65535 ))
          REVISION=$(( (RUN_ID / 65535) % 65535 ))
          ASSEMBLY_VERSION="$YEAR.$MONTH.$BUILD.$REVISION"
          if [ "${{ github.ref_name }}" = "dev" ]; then
            DLL_VERSION="DEV-$(date +%Y%m)$RUN_ID"
          else
            DLL_VERSION="$(date +%Y%m)$RUN_ID"
          fi
          echo "ASSEMBLY_VERSION=$ASSEMBLY_VERSION" >> $GITHUB_ENV
          echo "DLL_VERSION=$DLL_VERSION" >> $GITHUB_ENV
          echo "assembly_version=$ASSEMBLY_VERSION" >> $GITHUB_OUTPUT
          echo "dll_version=$DLL_VERSION" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          dotnet build src/GMO.Family.sln \
            -p:Version=${{ env.ASSEMBLY_VERSION }} \
            -p:AssemblyVersion=${{ env.ASSEMBLY_VERSION }} \
            -p:FileVersion=${{ env.ASSEMBLY_VERSION }} \
            -p:InformationalVersion=${{ env.DLL_VERSION }}

      - name: Create and push tag
        run: |
          TAG_NAME="${{ github.ref_name }}-$(date +%Y)-$(date +%m)-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

  # Uses GitHub Environments: main and dev. Set per environment:
  #   - SERVICE_NAME (variable), e.g. main → family, dev → family-dev
  #   - PORT (variable), e.g. 5002, 5003
  #   - DEPLOY_DOMAIN (secret) for deploy path and Let's Encrypt cert path, e.g. gideonogega.com
  # In logs, secrets appear as ***; the remote receives the real values.
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.ref_name }}
    env:
      DEPLOY_PATH: ${{ github.ref == 'refs/heads/main' && format('/var/www/family.{0}', secrets.DEPLOY_DOMAIN) || github.ref == 'refs/heads/dev' && format('/var/www/family-dev.{0}', secrets.DEPLOY_DOMAIN) || '' }}
      FULL_HOSTNAME: ${{ github.ref == 'refs/heads/main' && format('family.{0}', secrets.DEPLOY_DOMAIN) || github.ref == 'refs/heads/dev' && format('family-dev.{0}', secrets.DEPLOY_DOMAIN) || '' }}
      BRANCH: ${{ github.ref_name }}
      ASSEMBLY_VERSION: ${{ needs.build.outputs.assembly_version }}
      DLL_VERSION: ${{ needs.build.outputs.dll_version }}
      SETUP_CHANGED: ${{ needs.build.outputs.setup_changed }}
      PORT: ${{ vars.PORT }}
      SERVICE_NAME: ${{ vars.SERVICE_NAME }}
      CERT_DOMAIN: ${{ secrets.DEPLOY_DOMAIN }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      OPENTELEMETRY_ENABLED: ${{ secrets.OPENTELEMETRY_ENABLED }}
      OPENTELEMETRY_OTLPEXPORTENDPOINT: ${{ secrets.OPENTELEMETRY_OTLPEXPORTENDPOINT }}
      OPENTELEMETRY_LOGGINGENDPOINT: ${{ secrets.OPENTELEMETRY_LOGGINGENDPOINT }}
      OPENTELEMETRY_HEADERS: ${{ secrets.OPENTELEMETRY_HEADERS }}
      OPENTELEMETRY_METRICSENDPOINT: ${{ secrets.OPENTELEMETRY_METRICSENDPOINT }}
    steps:
      - name: Validate deploy config
        run: |
          if [ -z "$DEPLOY_PATH" ]; then
            echo "::error::DEPLOY_PATH is empty. Set DEPLOY_DOMAIN secret for this environment (or at repository level)."
            exit 1
          fi
          if [[ "$DEPLOY_PATH" != /var/www/* ]]; then
            echo "::error::DEPLOY_PATH is invalid. Set DEPLOY_DOMAIN secret for this environment."
            exit 1
          fi
          if [[ "$DEPLOY_PATH" == *. ]]; then
            echo "::error::DEPLOY_PATH looks invalid (missing domain?). Set DEPLOY_DOMAIN secret for this environment."
            exit 1
          fi

      - name: Get GitHub Runner IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Authorize Runner IP in Security Group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.SEC_GROUP_ID }} \
            --protocol tcp --port 22 --cidr ${{ steps.ip.outputs.ipv4 }}/32

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          envs: DEPLOY_PATH,BRANCH,SETUP_CHANGED,FULL_HOSTNAME,PORT,SERVICE_NAME,CERT_DOMAIN,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,ASSEMBLY_VERSION,DLL_VERSION,OPENTELEMETRY_ENABLED,OPENTELEMETRY_OTLPEXPORTENDPOINT,OPENTELEMETRY_LOGGINGENDPOINT,OPENTELEMETRY_HEADERS,OPENTELEMETRY_METRICSENDPOINT
          script: |
            sudo mkdir -p $DEPLOY_PATH
            sudo chown -R ubuntu:www-data $DEPLOY_PATH
            cd $DEPLOY_PATH
            if [ ! -d .git ]; then
              echo "Initial clone into $DEPLOY_PATH..."
              git clone -b $BRANCH https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git .
            fi
            git fetch origin $BRANCH
            git reset --hard origin/$BRANCH
            if [ "$SETUP_CHANGED" = "true" ] || [ ! -f "/etc/systemd/system/${SERVICE_NAME}.service" ]; then
              echo "Running configure-service.sh (script changed or service missing)..."
              sudo bash "$DEPLOY_PATH/scripts/configure-service.sh" "$FULL_HOSTNAME" "$PORT" "$SERVICE_NAME" "$CERT_DOMAIN"
            fi
            echo "Authentication__Google__ClientId=$GOOGLE_CLIENT_ID" > .env
            echo "Authentication__Google__ClientSecret=$GOOGLE_CLIENT_SECRET" >> .env
            echo "FAMILY_LOG_PATH=$DEPLOY_PATH/logs" >> .env
            echo "Serilog__WriteTo__1__Args__path=$DEPLOY_PATH/logs" >> .env
            echo "Telemetry__EnvironmentName=$BRANCH" >> .env
            [ -n "$OPENTELEMETRY_ENABLED" ] && echo "Telemetry__Enabled=$OPENTELEMETRY_ENABLED" >> .env
            [ -n "$OPENTELEMETRY_OTLPEXPORTENDPOINT" ] && echo "Telemetry__Otlp__Endpoint=$OPENTELEMETRY_OTLPEXPORTENDPOINT" >> .env
            [ -n "$OPENTELEMETRY_HEADERS" ] && echo "Telemetry__Otlp__Headers=$OPENTELEMETRY_HEADERS" >> .env
            [ -n "$OPENTELEMETRY_METRICSENDPOINT" ] && echo "Telemetry__MetricsEndpoint=$OPENTELEMETRY_METRICSENDPOINT" >> .env
            [ -n "$OPENTELEMETRY_LOGGINGENDPOINT" ] && echo "Telemetry__LoggingEndpoint=$OPENTELEMETRY_LOGGINGENDPOINT" >> .env
            chmod 600 .env
            mkdir -p ./logs
            sudo chown ubuntu:www-data ./logs
            dotnet publish src/GMO.Family.Web/GMO.Family.Web.csproj -c Release -o ./publish \
              -p:Version=$ASSEMBLY_VERSION \
              -p:AssemblyVersion=$ASSEMBLY_VERSION \
              -p:FileVersion=$ASSEMBLY_VERSION \
              -p:InformationalVersion=$DLL_VERSION
            sudo chown -R ubuntu:www-data $DEPLOY_PATH
            sudo systemctl restart $SERVICE_NAME

      - name: Revoke Runner IP (Cleanup)
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.SEC_GROUP_ID }} \
            --protocol tcp --port 22 --cidr ${{ steps.ip.outputs.ipv4 }}/32
