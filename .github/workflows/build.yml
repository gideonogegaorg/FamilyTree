name: Build and Deploy

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_USERNAME: ${{ secrets.GH_USER }}
      GITHUB_PAT: ${{ secrets.GH_CLASSIC_PAT }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install dotnet-format
        run: dotnet tool install -g dotnet-format
      - name: Verify format
        run: dotnet format src/GMO.Family.sln --verify-no-changes

  build:
    runs-on: ubuntu-latest
    needs: [lint]
    env:
      GITHUB_USERNAME: ${{ secrets.GH_USER }}
      GITHUB_PAT: ${{ secrets.GH_CLASSIC_PAT }}
    outputs:
      assembly_version: ${{ steps.setversion.outputs.assembly_version }}
      dll_version: ${{ steps.setversion.outputs.dll_version }}
      setup_changed: ${{ steps.filter.outputs.setup }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: family
          POSTGRES_PASSWORD: family
          POSTGRES_DB: family
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U family -d family"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            setup:
              - 'scripts/configure-service.sh'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Check NuGet auth for GMO feed
        run: |
          if [ -z "$GITHUB_PAT" ]; then
            echo "::error::GITHUB_PAT is empty. Add repository secret GH_CLASSIC_PAT (with read:packages) in this repo."
            exit 1
          fi

      - name: Generate appsettings.json for build
        run: bash scripts/generate-appsettings.sh

      - name: Set version
        id: setversion
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          DAY=$(date +%d)
          HHMM=$(date +%H%M)
          ASSEMBLY_VERSION="$YEAR.$MONTH.$DAY.$HHMM"
          if [ "${{ github.ref_name }}" = "dev" ]; then
            DLL_VERSION="DEV-$YEAR$MONTH$DAY-$HHMM"
          else
            DLL_VERSION="$YEAR$MONTH$DAY-$HHMM"
          fi
          echo "ASSEMBLY_VERSION=$ASSEMBLY_VERSION" >> $GITHUB_ENV
          echo "DLL_VERSION=$DLL_VERSION" >> $GITHUB_ENV
          echo "assembly_version=$ASSEMBLY_VERSION" >> $GITHUB_OUTPUT
          echo "dll_version=$DLL_VERSION" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          dotnet build src/GMO.Family.sln \
            -p:Version=${{ env.ASSEMBLY_VERSION }} \
            -p:AssemblyVersion=${{ env.ASSEMBLY_VERSION }} \
            -p:FileVersion=${{ env.ASSEMBLY_VERSION }} \
            -p:InformationalVersion=${{ env.DLL_VERSION }}

      - name: Test
        run: |
          set +e
          dotnet test src/GMO.Family.sln --no-build --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage 2>&1 | tee test.log
          EXIT=$?
          if [ $EXIT -ne 0 ] && grep -qi "no test is available\|no test matched" test.log; then
            echo "No test projects yet; step passes until tests are added."
            exit 0
          fi
          exit $EXIT

      - name: Upload coverage results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-results
          path: coverage/**/coverage.cobertura.xml
          retention-days: 30

  tag:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create and push tag
        run: |
          TAG_NAME="${{ github.ref_name }}-$(date +%Y)-$(date +%m)-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [build, tag]
    environment: ${{ github.ref_name }}
    env:
      DEPLOY_PATH: ${{ github.ref == 'refs/heads/main' && format('/var/www/family.{0}', secrets.DEPLOY_DOMAIN) || github.ref == 'refs/heads/dev' && format('/var/www/family-dev.{0}', secrets.DEPLOY_DOMAIN) || '' }}
      FULL_HOSTNAME: ${{ github.ref == 'refs/heads/main' && format('family.{0}', secrets.DEPLOY_DOMAIN) || github.ref == 'refs/heads/dev' && format('family-dev.{0}', secrets.DEPLOY_DOMAIN) || '' }}
      BRANCH: ${{ github.ref_name }}
      ASSEMBLY_VERSION: ${{ needs.build.outputs.assembly_version }}
      DLL_VERSION: ${{ needs.build.outputs.dll_version }}
      SETUP_CHANGED: ${{ needs.build.outputs.setup_changed }}
      PORT: ${{ vars.PORT }}
      SERVICE_NAME: ${{ vars.SERVICE_NAME }}
      CERT_DOMAIN: ${{ secrets.DEPLOY_DOMAIN }}
      POSTGRES_CONNECTION_STRING: ${{ secrets.POSTGRES_CONNECTION_STRING }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      OPENTELEMETRY_ENABLED: ${{ secrets.OPENTELEMETRY_ENABLED }}
      OPENTELEMETRY_OTLPEXPORTENDPOINT: ${{ secrets.OPENTELEMETRY_OTLPEXPORTENDPOINT }}
      OPENTELEMETRY_LOGGINGENDPOINT: ${{ secrets.OPENTELEMETRY_LOGGINGENDPOINT }}
      OPENTELEMETRY_HEADERS: ${{ secrets.OPENTELEMETRY_HEADERS }}
      OPENTELEMETRY_METRICSENDPOINT: ${{ secrets.OPENTELEMETRY_METRICSENDPOINT }}
      GITHUB_USERNAME: ${{ secrets.GH_USER }}
      GITHUB_PAT: ${{ secrets.GH_CLASSIC_PAT }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Validate deploy config
        run: |
          if [ -z "$DEPLOY_PATH" ]; then
            echo "::error::DEPLOY_PATH is empty. Set DEPLOY_DOMAIN secret for this environment (or at repository level)."
            exit 1
          fi
          if [[ "$DEPLOY_PATH" != /var/www/* ]]; then
            echo "::error::DEPLOY_PATH is invalid. Set DEPLOY_DOMAIN secret for this environment."
            exit 1
          fi
          if [[ "$DEPLOY_PATH" == *. ]]; then
            echo "::error::DEPLOY_PATH looks invalid (missing domain?). Set DEPLOY_DOMAIN secret for this environment."
            exit 1
          fi

      - name: Generate appsettings.json for deploy
        env:
          SERILOG_LOG_PATH: ${{ env.DEPLOY_PATH }}/logs
          TELEMETRY_ENVIRONMENT_NAME: ${{ github.ref_name }}
        run: bash scripts/generate-appsettings.sh

      - name: Publish
        run: |
          dotnet publish src/GMO.Family.Web/GMO.Family.Web.csproj -c Release -o ./site \
            -p:Version=${{ env.ASSEMBLY_VERSION }} \
            -p:AssemblyVersion=${{ env.ASSEMBLY_VERSION }} \
            -p:FileVersion=${{ env.ASSEMBLY_VERSION }} \
            -p:InformationalVersion=${{ env.DLL_VERSION }}

      - name: Get GitHub Runner IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Authorize Runner IP in Security Group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.SEC_GROUP_ID }} \
            --protocol tcp --port 22 --cidr ${{ steps.ip.outputs.ipv4 }}/32

      - name: Copy site output to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "site/*,scripts/configure-service.sh"
          target: "/tmp/family-deploy-${{ github.run_id }}"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          debug: true
          script: |
            set -e
            DEPLOY_PATH='${{ env.DEPLOY_PATH }}'
            BRANCH='${{ env.BRANCH }}'
            SETUP_CHANGED='${{ env.SETUP_CHANGED }}'
            FULL_HOSTNAME='${{ env.FULL_HOSTNAME }}'
            PORT='${{ env.PORT }}'
            SERVICE_NAME='${{ env.SERVICE_NAME }}'
            CERT_DOMAIN='${{ env.CERT_DOMAIN }}'
            STAGING="/tmp/family-deploy-${{ github.run_id }}"
            trap 'rm -rf "$STAGING"' EXIT
            echo "[Deploy] Ensuring directory..."
            sudo mkdir -p "$DEPLOY_PATH/site" "$DEPLOY_PATH/logs"
            sudo chown -R ubuntu:www-data "$DEPLOY_PATH"
            if [ "$SETUP_CHANGED" = "true" ] || [ ! -f "/etc/systemd/system/${SERVICE_NAME}.service" ]; then
              echo "[Deploy] Running configure-service.sh..."
              sudo bash "$STAGING/scripts/configure-service.sh" "$FULL_HOSTNAME" "$PORT" "$SERVICE_NAME" "$CERT_DOMAIN"
            fi
            echo "[Deploy] Copying site output..."
            cp -r "$STAGING/site/"* "$DEPLOY_PATH/site/"
            sudo chown -R ubuntu:www-data "$DEPLOY_PATH"
            echo "[Deploy] Restarting service..."
            sudo systemctl restart "$SERVICE_NAME"
            echo "[Deploy] Done."

      - name: Revoke Runner IP (Cleanup)
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.SEC_GROUP_ID }} \
            --protocol tcp --port 22 --cidr ${{ steps.ip.outputs.ipv4 }}/32
