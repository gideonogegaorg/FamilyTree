name: Sync prod environment secrets

on:
  workflow_dispatch:

permissions:
  secrets: write

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: main
    steps:
      - name: Copy deploy secrets from main to prod environment
        env:
          PG_USER: ${{ secrets.PG_USER }}
          PG_PASS: ${{ secrets.PG_PASS }}
          OPENTELEMETRY_ENABLED: ${{ secrets.OPENTELEMETRY_ENABLED }}
          OPENTELEMETRY_OTLPEXPORTENDPOINT: ${{ secrets.OPENTELEMETRY_OTLPEXPORTENDPOINT }}
          OPENTELEMETRY_HEADERS: ${{ secrets.OPENTELEMETRY_HEADERS }}
          OPENTELEMETRY_METRICSENDPOINT: ${{ secrets.OPENTELEMETRY_METRICSENDPOINT }}
          OPENTELEMETRY_LOGGINGENDPOINT: ${{ secrets.OPENTELEMETRY_LOGGINGENDPOINT }}
          GH_USER: ${{ secrets.GH_USER }}
          GH_CLASSIC_PAT: ${{ secrets.GH_CLASSIC_PAT }}
        run: |
          set -euo pipefail
          REPO="gideonogegaorg/FamilyTree"
          for name in PG_USER PG_PASS OPENTELEMETRY_ENABLED OPENTELEMETRY_OTLPEXPORTENDPOINT OPENTELEMETRY_HEADERS OPENTELEMETRY_METRICSENDPOINT OPENTELEMETRY_LOGGINGENDPOINT GH_USER GH_CLASSIC_PAT; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "Skipping $name (empty in main environment)."
              continue
            fi
            printf '%s' "$value" | gh secret set "$name" --env prod --repo "$REPO"
            echo "Set prod environment secret: $name"
          done

      - name: Ensure prod environment variables
        run: |
          gh variable set IS_PRODUCTION --env prod --repo gideonogegaorg/FamilyTree --body "true"
          gh variable set PORT --env prod --repo gideonogegaorg/FamilyTree --body "5002"
          gh variable set SERVICE_NAME --env prod --repo gideonogegaorg/FamilyTree --body "family"
          gh variable set S3_PHOTOS_BUCKET --env prod --repo gideonogegaorg/FamilyTree --body "gideonogega-internal"
