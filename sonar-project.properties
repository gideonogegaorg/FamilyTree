sonar.projectKey=gideonogegaorg_FamilyTree
sonar.organization=gideonogegaorg

sonar.projectName=GMO.FamilyTree
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8

# C# sources and tests
sonar.sources=src
sonar.tests=tst

# Exclude design-time, vendor, and generated assets
sonar.exclusions=**/Migrations/**,**/AppDbContextFactory.cs,**/wwwroot/lib/**,**/bin/**,**/obj/**,**/coverage/**

# Test project exclusions from duplication analysis
sonar.cpd.exclusions=**/tst/**

# Coverage (Cobertura from coverlet, merged in CI)
sonar.coverageReportPaths=coverage/combined/Cobertura.xml

# Quality gate is configured in SonarCloud UI:
# - Line coverage >= 80%
# - New code coverage >= 80%
# - Zero new blocker issues
# - Duplicated lines <= 3%
