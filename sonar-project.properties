sonar.projectKey=gideonogegaorg_FamilyTree
sonar.organization=gideonogegaorg

sonar.projectName=GMO.FamilyTree
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8

# C# sources and tests
sonar.sources=src
sonar.tests=tst

# Exclude design-time, vendor, and generated assets
sonar.exclusions=**/Migrations/**,**/AppDbContextFactory.cs,**/wwwroot/lib/**,**/wwwroot/js/**,**/.github/**,**/bin/**,**/obj/**,**/coverage/**

# Test project exclusions from duplication analysis
sonar.cpd.exclusions=**/tst/**

# OpenCover paths are set in CI via sonar.cs.opencover.reportsPaths on scanner begin.
# See https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/test-coverage/dotnet-test-coverage

# Quality gate is configured in SonarCloud UI:
# - Line coverage >= 80%
# - New code coverage >= 80%
# - Zero new blocker issues
# - Duplicated lines <= 3%
